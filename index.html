<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Google Docs API Call</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 40px auto;
            max-width: 700px;
            line-height: 1.6;
            color: #333;
        }
        #content {
            background: #ffffff;
            padding: 30px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            white-space: pre-wrap; /* Preserves line breaks from the doc */
        }
        .error { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Document Content</h1>
    <div id="content">Fetching from Google Docs API...</div>

    <script>
        // CONFIGURATION
        const API_KEY = 'DOCS_API_KEY_PLACEHOLDER';
        const DOCUMENT_ID = 'DOC_ID_PLACEHOLDER';

        const url = `https://docs.googleapis.com/v1/documents/${DOCUMENT_ID}?key=${API_KEY}`;

        // Function to parse the massive structural JSON Google returns
        function extractTextFromJson(docData) {
            let extractedText = "";
            const bodyContent = docData.body.content;

            bodyContent.forEach(element => {
                // Check if structural element is a paragraph
                if (element.paragraph) {
                    element.paragraph.elements.forEach(el => {
                        if (el.textRun && el.textRun.content) {
                            extractedText += el.textRun.content;
                        }
                    });
                }
                // Check if structural element is a table
                else if (element.table) {
                    element.table.tableRows.forEach(row => {
                        row.tableCells.forEach(cell => {
                            cell.content.forEach(cellElement => {
                                if (cellElement.paragraph) {
                                    cellElement.paragraph.elements.forEach(el => {
                                        if (el.textRun && el.textRun.content) {
                                            extractedText += el.textRun.content;
                                        }
                                    });
                                }
                            });
                        });
                    });
                }
            });

            return extractedText;
        }

        // Execute API Call
        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                const cleanText = extractTextFromJson(data);
                document.getElementById('content').innerText = cleanText;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `<span class="error">Failed to fetch document. Ensure API Key restrictions and Doc sharing settings are correct.</span>`;
                console.error('Error fetching document:', error);
            });
    </script>
</body>
</html>
