<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsorted Thoughts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Special Elite", Roboto, sans-serif;
            margin: 40px auto;
            line-height: 1.6;
            color: #333;
        }

        .wrapper {
            padding: 1rem;
        }

        #content {
            background: #ffffff;
            white-space: pre-wrap; /* Preserves line breaks from the doc */
        }

        p {
            margin-block-start: 0;
            margin-block-end: 0;
        }

        .lineBreak {
            display: block;
            height: 1rem;
        }

        /* .thought-card {
            border-bottom: 1px #333 dashed;
            margin-bottom: 1rem;
        } */


        .title {
            font-weight: 600;
        }
        
        .error { color: #d93025; font-weight: bold; }

        #content {
            column-count: 5;
            column-gap: 20px;
            padding: 20px;
            width: 100%;
        }

        /* Individual thought blocks */
        .thought-card {
            background: #feff9c;
            padding: 15px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0.1rem 0.75rem #333);
            
            break-inside: avoid; 
            display: inline-block;   
            width: 100%;
        }

        @media (max-width: 900px) {
            #content { column-count: 2; }
        }
        @media (max-width: 600px) {
            #content { column-count: 1; }
        }
    </style>
</head>
<body>
    <div class="wrapper">     
        <h1>Unsorted Thoughts</h1>
        <div id="content">Thinking (sort of)...</div>
    </div>

    <script>
        // CONFIGURATION
        const API_KEY = 'DRIVE_API_KEY_PLACEHOLDER';
        const DOCUMENT_ID = 'DOC_ID_PLACEHOLDER';

       // We ask the Drive API to export the Google Doc directly as HTML
        const url = `https://www.googleapis.com/drive/v3/files/${DOCUMENT_ID}/export?mimeType=text/html&key=${API_KEY}`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text();
            })
            .then(htmlString => {
                const parser = new DOMParser();
                const googleDoc = parser.parseFromString(htmlString, 'text/html');
                
                const docBody = googleDoc.body;

                const elementsWithStyle = docBody.querySelectorAll('[style]');
                elementsWithStyle.forEach(el => el.removeAttribute('style'));

                const thoughts = [[]];

                const paragraphs = docBody.querySelectorAll('p');

                let publishThought = true;

                paragraphs.forEach(paragraph => {
                    const text = paragraph.innerText.trim();
                    const isNewThought = text.includes('#');

                    // Set line breaks on empty spans
                    if (!text) { 
                        paragraph.classList.add('lineBreak');
                    }

                    // Split into array of thoughts by splitting on '#'
                    if (isNewThought && !text.toLowerCase().includes('no publish')) {
                        // Start a new thought
                        publishThought = true;
                        thoughts.push([]);
                    }

                    // Skip 'no publish'
                    if (isNewThought && text.toLowerCase().includes('no publish')) {
                        publishThought = false;
                    }

                    if (publishThought && !isNewThought) {
                        thoughts[thoughts.length -1].push(paragraph);
                    }

                    if (text.charAt(text.length -1) === ':') {
                        paragraph.classList.add('title');
                    }
                });

                // 2. Clear the target container and inject the structured Flex items
                const contentContainer = document.getElementById('content');
                contentContainer.innerHTML = ''; // Clear previous content

                thoughts.forEach(thoughtElements => {
                    // Create a wrapper div for this specific "thought" card
                    const thoughtCard = document.createElement('div');
                    thoughtCard.classList.add('thought-card');

                    // Append all paragraphs belonging to this thought into the card
                    thoughtElements.forEach(p => {
                        thoughtCard.appendChild(p.cloneNode(true));
                    });

                    // Add the finished card to the main container
                    contentContainer.appendChild(thoughtCard);
                });

                // document.getElementById('content').innerHTML = docBody.innerHTML;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `<span class="error">Failed to fetch document via Drive API.</span>`;
                console.error('Error:', error);
            });

    </script>
</body>
</html>
