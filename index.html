<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official Google Docs API Call</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 40px auto;
            max-width: 700px;
            line-height: 1.6;
            color: #333;
        }
        #content {
            background: #ffffff;
            padding: 30px;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            white-space: pre-wrap; /* Preserves line breaks from the doc */
        }
        .error { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Unsorted Thoughts</h1>
    <div id="content">Thinking (sort of)...</div>

    <script>
        // CONFIGURATION
        const API_KEY = 'DRIVE_API_KEY_PLACEHOLDER';
        const DOCUMENT_ID = 'DOC_ID_PLACEHOLDER';

       // We ask the Drive API to export the Google Doc directly as HTML
        const url = `https://www.googleapis.com/drive/v3/files/${DOCUMENT_ID}/export?mimeType=text/html&key=${API_KEY}`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text(); // Note: we want .text(), not .json()
            })
            .then(htmlData => {
                console.log("htmlData!", htmlData);
                // Since it returns HTML, we can inject it right into our page
                document.getElementById('content').innerHTML = htmlData;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `<span class="error">Failed to fetch document via Drive API.</span>`;
                console.error('Error:', error);
            });

    </script>
</body>
</html>
