<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unsorted Thoughts</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Special Elite", Roboto, sans-serif;
            margin: 40px auto;
            max-width: 700px;
            line-height: 1.6;
            color: #333;
        }
        #content {
            background: #ffffff;
            white-space: pre-wrap; /* Preserves line breaks from the doc */
        }

        p {
            margin-block-start: 0;
            margin-block-end: 0;
        }

        p span:empty {
            margin-block-start: 1em;
            margin-block-end: 1em;
        }
        .error { color: #d93025; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Unsorted Thoughts</h1>
    <div id="content">Thinking (sort of)...</div>

    <script>
        // CONFIGURATION
        const API_KEY = 'DRIVE_API_KEY_PLACEHOLDER';
        const DOCUMENT_ID = 'DOC_ID_PLACEHOLDER';

       // We ask the Drive API to export the Google Doc directly as HTML
        const url = `https://www.googleapis.com/drive/v3/files/${DOCUMENT_ID}/export?mimeType=text/html&key=${API_KEY}`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.text(); // Note: we want .text(), not .json()
            })
            .then(htmlString => {
                // 1. Parse the incoming string into a temporary HTML document
                const parser = new DOMParser();
                const googleDoc = parser.parseFromString(htmlString, 'text/html');
                
                // 2. Target Google's body content, ignoring their <head> and <style> tags
                const docBody = googleDoc.body;

                // 3. Optional: Strip inline styling that Google forces on spans (like fonts/colors)
                // This forces the text to adapt to YOUR website's CSS instead of Google's
                const elementsWithStyle = docBody.querySelectorAll('[style]');
                elementsWithStyle.forEach(el => el.removeAttribute('style'));



                // 4. Inject just the clean HTML structural text (p, h1, h2, etc.) into your page
                document.getElementById('content').innerHTML = docBody.innerHTML;
            })
            .catch(error => {
                document.getElementById('content').innerHTML = `<span class="error">Failed to fetch document via Drive API.</span>`;
                console.error('Error:', error);
            });

    </script>
</body>
</html>
